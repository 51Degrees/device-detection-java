name: Selenium API tests

# Runs the shared Selenium contract for this repo's example against the live cloud.
on:
  push:  # TEMPORARY: run on any branch push (no PR needed) — remove before merge
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  selenium-api-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out device-detection-java
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.ACCESS_TOKEN }}

      - name: Check out device-detection-java-examples
        uses: actions/checkout@v4
        with:
          repository: 51Degrees/device-detection-java-examples
          path: device-detection-java-examples
          token: ${{ secrets.ACCESS_TOKEN }}

      - name: Check out selenium-api-tests
        uses: actions/checkout@v4
        with:
          repository: 51Degrees/selenium-api-tests
          path: selenium-api-tests
          token: ${{ secrets.ACCESS_TOKEN }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build the shared contract tests
        run: dotnet build selenium-api-tests/SeleniumApiTests.csproj -c Release

      - name: Install the dev device-detection-java library
        run: mvn install -B --no-transfer-progress -DskipTests -DskipNativeBuild=true

      - name: Launch the example and run the contract
        env:
          PORT: "8099"
          EXAMPLE_URL: http://localhost:8099
          EXAMPLE_LANG: java
          SUPER_RESOURCE_KEY: ${{ secrets.SUPER_RESOURCE_KEY }}
        run: |
          # Build the cloud example against the just-installed dev library.
          dev_ver=$(mvn -q help:evaluate -Dexpression=project.version -DforceStdout)
          pushd device-detection-java-examples
          mvn -B --no-transfer-progress -pl web/getting-started.cloud -am package -DskipTests \
            -Ddevice-detection.version="$dev_ver"
          jar=$(ls web/getting-started.cloud/target/*-jar-with-dependencies.jar | head -1)
          PORT="$PORT" \
          TestCloudEndpoint=https://cloud.51degrees.com/api/v4 \
          TestResourceKey="$SUPER_RESOURCE_KEY" \
          java -jar "$jar" &
          example_pid=$!
          popd
          for i in $(seq 1 30); do
            curl -sf -o /dev/null "http://localhost:${PORT}/" && break || sleep 2
          done
          # Run the shared contract against the live cloud.
          printf '{ "cloud_root_url": "https://cloud.51degrees.com/", "paid_resource_key": "%s" }\n' \
            "$SUPER_RESOURCE_KEY" > "$RUNNER_TEMP/testConfig.json"
          TEST_CONFIG_FILE="$RUNNER_TEMP/testConfig.json" \
            dotnet test selenium-api-tests/SeleniumApiTests.csproj -c Release --no-build \
              --filter 'FullyQualifiedName~ExampleClientSideOverride|FullyQualifiedName~ExampleRenderTests'
          status=$?
          kill "$example_pid" 2>/dev/null || true
          exit $status
